# Sample configuration for wise-home-index.
#
# Each application requires a `name` and a `url`. The `image` field is optional;
# when omitted, a default tile image is shown.
#
# URL classification:
#   * public  -> sub-domains of home.bradandmarsha.com (shown to everyone)
#   * private -> short names such as ceph-dashboard (shown only to the
#                private network)
#
# Override this file at runtime by pointing WISE_HOME_INDEX_CONFIG (env) or the
# wise.home.index.config system property at your own YAML file.
applications:
  - name: Grafana
    url: https://grafana.home.bradandmarsha.com
    image: https://grafana.home.bradandmarsha.com/public/img/grafana_icon.svg

  - name: Ceph Dashboard
    url: https://ceph-dashboard
