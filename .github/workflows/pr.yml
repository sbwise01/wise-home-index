name: PR checks & version bump

on:
  pull_request:
    branches: [main]
    # `edited` re-runs when the PR title changes (title drives the bump level).
    types: [opened, synchronize, reopened, edited]
    # Only source changes warrant a test/build + version bump. Metadata-only PRs
    # (docs, LICENSE, workflows, etc.) are skipped entirely.
    paths:
      - "src/**"
      - "Dockerfile"
      - ".dockerignore"
      - "pom.xml"

permissions:
  contents: write # commit the pom.xml version bump back to the PR branch

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-and-bump:
    name: Verify & bump
    runs-on: ubuntu-latest
    # Same-repo PRs only. Fork PRs can't be granted write on the branch to push
    # the bump (and can't assume AWS roles), matching wise-k8s/terraform-plan.yml.
    # Bot bump commits use [skip ci] so the workflow is not triggered at all; the
    # github.actor guard below is a backup if a run is still queued (that path
    # still prompts for approval on the PR before skipping the job).
    if: github.event.pull_request.head.repo.full_name == github.repository
        && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0 # need full history + tags for the checks below

      # 1. Fail early if the branch is behind main. Combined with the branch
      #    protection rule "Require branches to be up to date before merging",
      #    this also serializes version numbers across concurrent PRs.
      - name: Ensure branch is up to date with main
        run: |
          set -euo pipefail
          git fetch origin main --tags --quiet
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "::error::Branch is behind 'main'. Merge/rebase 'main' and push again."
            exit 1
          fi

      # 2. The version we bump *from* is main's pom.xml version, and it must be a
      #    real released baseline (a git tag of that exact value on main). Reading
      #    the base version (not the PR's) is what makes the bump idempotent on
      #    re-runs after the bot has already committed a bump to this PR.
      - name: Verify main's pom version is released (tagged)
        id: base
        run: |
          set -euo pipefail
          git show origin/main:pom.xml > /tmp/main-pom.xml
          base_version="$(python3 .github/scripts/pom_version.py /tmp/main-pom.xml)"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "main pom version: $base_version"
          if ! git tag --list "$base_version" | grep -qx "$base_version"; then
            echo "::error::main pom.xml version '$base_version' has no matching git tag. Seed once: git tag $base_version origin/main && git push origin $base_version"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$base_version" origin/main; then
            echo "::error::git tag '$base_version' is not part of 'main' history."
            exit 1
          fi

      # 3. PR title must be a Conventional Commit, and it determines the bump.
      #    Any valid title yields at least a patch, so every merge advances the
      #    version (the release workflow tags on every merge).
      - name: Validate PR title & determine bump level
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          types='feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert'
          if [[ ! "$PR_TITLE" =~ ^(${types})(\([a-zA-Z0-9._/-]+\))?(!)?:[[:space:]].+ ]]; then
            echo "::error::PR title is not a valid Conventional Commit: '$PR_TITLE'"
            echo "Examples: 'feat: add X', 'fix(discovery): handle Y', 'feat!: breaking Z'"
            exit 1
          fi
          type="${BASH_REMATCH[1]}"
          bang="${BASH_REMATCH[3]}"
          if [[ "$bang" == "!" ]] || grep -qE '^BREAKING CHANGE:' <<< "${PR_BODY:-}"; then
            level=major
          elif [[ "$type" == "feat" ]]; then
            level=minor
          else
            level=patch
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Bump level: $level"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Docker test build: the `build` stage runs `mvn clean package` (unit
      #    tests). Fails the PR early if tests fail. Nothing is pushed.
      - name: Docker test build (unit tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: build
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Compute next = base + bump, write it to pom.xml, and commit to the PR.
      #    [skip ci] on the bump commit prevents re-triggering this workflow; the
      #    github.actor guard is a backup. Idempotent: if pom already equals `next`, no commit.
      - name: Compute next version & bump pom.xml
        env:
          BASE_VERSION: ${{ steps.base.outputs.base_version }}
          LEVEL: ${{ steps.bump.outputs.level }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if [[ ! "$BASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::base version '$BASE_VERSION' is not semver X.Y.Z"; exit 1
          fi
          MA="${BASH_REMATCH[1]}"; MI="${BASH_REMATCH[2]}"; PA="${BASH_REMATCH[3]}"
          case "$LEVEL" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            patch) PA=$((PA + 1)) ;;
          esac
          next="${MA}.${MI}.${PA}"
          echo "Next version: $next"
          if git tag --list "$next" | grep -qx "$next"; then
            echo "::error::version '$next' is already tagged (released or burned). Update your branch with 'main' and re-run."
            exit 1
          fi
          current="$(python3 .github/scripts/pom_version.py pom.xml)"
          if [[ "$current" == "$next" ]]; then
            echo "pom.xml already at $next — no commit needed."
            exit 0
          fi
          # Replace only the first (top-level project) <version> element.
          awk -v v="$next" 'BEGIN{done=0} !done && match($0,/<version>[^<]*<\/version>/){sub(/<version>[^<]*<\/version>/,"<version>" v "</version>"); done=1} {print}' pom.xml > pom.xml.tmp
          mv pom.xml.tmp pom.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore(release): set version to ${next} [skip ci]"
          git push origin "HEAD:${HEAD_REF}"
